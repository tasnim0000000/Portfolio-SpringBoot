spring.application.name=portfolio
# Vercel's container contract: it routes traffic to port 80 by default unless
# you explicitly set a PORT env var in the project's Environment Variables.
# We don't set one on Vercel, so this needs to default to 80 there.
# Locally (docker run -e PORT=9090 ...), the explicit env var overrides this.
server.port=${PORT:80}
server.address=0.0.0.0
