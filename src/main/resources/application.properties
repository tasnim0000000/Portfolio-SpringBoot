spring.application.name=portfolio
# Vercel's container contract: it routes traffic to port 80 by default unless
# you explicitly set a PORT env var in the project's Environment Variables.
# We don't set one on Vercel, so this needs to default to 80 there.
# Locally (docker run -e PORT=9090 ...), the explicit env var overrides this.
server.port=${PORT:80}
server.address=0.0.0.0

# --- Contact form email settings ---
# MAIL_USERNAME / MAIL_APP_PASSWORD are read from environment variables so the
# real credentials never get committed to git. See README.md -> "Contact form"
# for how to generate a Gmail App Password and set these.
# The ":" empty-string fallback is deliberate: if these env vars are ever
# missing, the whole app should still start (and just fail to send mail when
# the contact form is used) instead of crashing on every single request.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# The address that receives every message submitted through the contact form
portfolio.contact.recipient=tasnimtbh123@gmail.com
