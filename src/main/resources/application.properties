spring.application.name=portfolio
# Locally this falls back to 9090 (no PORT env var set, same as the class demo).
# On Vercel, the platform injects PORT at runtime and the app must listen on it.
server.port=${PORT:9090}
server.address=0.0.0.0

# --- Contact form email settings ---
# MAIL_USERNAME / MAIL_APP_PASSWORD are read from environment variables so the
# real credentials never get committed to git. See README.md -> "Contact form"
# for how to generate a Gmail App Password and set these.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# The address that receives every message submitted through the contact form
portfolio.contact.recipient=tasnimtbh123@gmail.com
